<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu lần đầu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">

<div class="auth-card">
    <div class="text-center mb-4">
        <i class="fas fa-shield-alt" style="font-size: 3rem; color: var(--warning); margin-bottom: 15px;"></i>
        <h2 style="color: var(--dark); font-weight: 700;">ĐỔI MẬT KHẨU</h2>
        <p style="color: var(--danger); font-size: 0.85rem; margin-top: 5px; font-weight: 600;">Yêu cầu bảo mật bắt buộc ở lần đăng nhập đầu</p>
    </div>

    <form id="pwdForm">
        <div class="form-group">
            <label>Xác nhận Email</label>
            <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu mới</label>
            <input type="password" id="newPwd" class="form-control" minlength="6" required>
        </div>
        <div class="form-group" style="margin-bottom: 25px;">
            <label>Nhập lại mật khẩu mới</label>
            <input type="password" id="confirmPwd" class="form-control" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-success w-100" id="btnChange" style="justify-content: center;">LƯU MẬT KHẨU</button>
    </form>
</div>

<script src="/js/api-client.js"></script>
<script>
    document.getElementById('pwdForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const newPwd = document.getElementById('newPwd').value;
        if (newPwd !== document.getElementById('confirmPwd').value) {
            UI.toast("Mật khẩu nhập lại không khớp!", "error"); return;
        }

        try {
            await fetch('http://localhost:8080/api/auth/change-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, newPassword: newPwd })
            });
            UI.toast("Đổi mật khẩu thành công! Hãy đăng nhập lại.", "success");
            setTimeout(() => window.location.href = '/index.html', 1500);
        } catch (error) { UI.toast("Lỗi hệ thống", "error"); }
    });
</script>
</body>
</html>
